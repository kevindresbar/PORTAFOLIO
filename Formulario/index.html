<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
    <form action="">

<fieldset class="InformacionPersonal">
    <legend>Informacion Personal</legend>

    <label for="name">Nombre:</label>
    <input type="text" placeholder="Tu Nombre" id="name">

    <label for="LasName">Tu Apellido</label>
    <input type="text" placeholder="Tu Apellido" id="LastName">

    <label for="Id">Numero De Identificacion</label>
    <input type="number" placeholder="0000000" id="Id">

    <label for="DayOfB">Fecha De Nacimieto</label>
    <input type="date" placeholder="Fecha de Nacimiento" id="DayOfB">
    

</fieldset>
<fieldset class="Dirección">
    <legend>Ubicación</legend>

    <label for="HomeAddress">Direccion de Domicilio</label>
    <input type="text" placeholder="Dirección" id="HomeAddress">

    <label for="Street">Barrio</label>
    <input type="text" placeholder="Barrio" id="Street">

    <label for="City">Ciudad</label>
    <select name="" id="City">
        <option value="">None</option>
        <option value="">Barranca</option>
        <option value="">Putumayo</option>
        <option value="">Bogota</option>
    </select>


    <label for="Country">Pais</label>
    <select name="" id="Country">
        <option value="">None</option>
        <option value="">Venezuela</option>
        <option value="">Cuba</option>
        <option value="">Colombia</option>
    </select>

</fieldset>

<fieldset class="Contacto">
    <legend>Contacto</legend>
     <label for="Mail">Correo Electronico</label>
    <input type="email" placeholder="XXXXXXX@ejemplo.com" id="Mail">

    <label for="PhoneNumber"></label>
    <input type="text" placeholder="Tu Numero Celular" id="PhoneNumber">

</fieldset>
<fieldset class="Finaliza Sesión">
    <legend> Finaliza Sesión</legend>
    <label for="Password"></label>
    <input type="password" placeholder="Contraseña" id="Password">
</fieldset>
<button>Guardar</button>


    </form>
    
</body>
</html>
